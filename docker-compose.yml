services:
  app:
    build: .
    container_name: polymarket_app
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - redis
      - zookeeper
      - kafka1
      - kafka2
      - kafka3
      - clickhouse
      - mysql
      - mongodb
    command: python -c "print('polymarket app container is ready')"

  init_infra:
    build: .
    container_name: polymarket_init_infra
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - kafka1
      - kafka2
      - kafka3
      - clickhouse
    command: python -m scripts.init_infra

  celery_worker:
    build: .
    container_name: polymarket_celery_worker
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - redis
      - zookeeper
      - kafka1
      - kafka2
      - kafka3
      - clickhouse
      - mysql
      - mongodb
    command: celery -A app.celery.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build: .
    container_name: polymarket_celery_beat
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env.docker
    depends_on:
      - redis
      - zookeeper
      - kafka1
      - kafka2
      - kafka3
      - clickhouse
      - mysql
      - mongodb
    command: celery -A app.celery.celery_app beat --loglevel=info

  redis:
    image: redis:7
    container_name: polymarket_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: polymarket_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log_data:/var/lib/zookeeper/log

  kafka1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: polymarket_kafka1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    volumes:
      - kafka1_data:/var/lib/kafka/data

  kafka2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: polymarket_kafka2
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
      - "19093:19093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:19093,EXTERNAL://localhost:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19093,EXTERNAL://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    volumes:
      - kafka2_data:/var/lib/kafka/data

  kafka3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: polymarket_kafka3
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
      - "19094:19094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:19094,EXTERNAL://localhost:9094
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:19094,EXTERNAL://0.0.0.0:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    volumes:
      - kafka3_data:/var/lib/kafka/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: polymarket_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  mysql:
    image: mysql:8.0
    container_name: polymarket_mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: polymarket
      MYSQL_USER: polymarket_user
      MYSQL_PASSWORD: polymarket_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7
    container_name: polymarket_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  metabase:
    image: metabase/metabase:latest
    container_name: polymarket_metabase
    depends_on:
      - mysql
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: mysql
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 3306
      MB_DB_USER: polymarket_user
      MB_DB_PASS: polymarket_password
      MB_DB_HOST: mysql

volumes:
  redis_data:
  zookeeper_data:
  zookeeper_log_data:
  kafka1_data:
  kafka2_data:
  kafka3_data:
  clickhouse_data:
  mysql_data:
  mongodb_data:
  metabase_data:
